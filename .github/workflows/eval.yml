name: Eval

# Gates prompt and skill regressions. Runs `sentinel eval run` against the
# fixture corpus and fails the check if any fixture regresses.
#
# Triggered on PRs that touch skill code, the eval harness, runner,
# entrypoint, or fixtures. Other PRs (docs, tests, config) skip to save
# API tokens.
#
# No push: main trigger — every skill-affecting change already runs eval
# as a PR, so a re-run on merge would add no signal. Periodic drift
# checks belong on a schedule, not on every push.
#
# Secret protection: the real guard for fork PRs is the `pull_request`
# trigger — GitHub does not expose secrets to workflows triggered by
# forks. Step-level env scoping of ANTHROPIC_API_KEY is defense in
# depth, not the primary protection. permissions:contents:read is set
# at both workflow and job level so any future job inherits least
# privilege by default.

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'sentinel/skills/**'
      - 'sentinel/evals/**'
      - 'sentinel/runner.py'
      - 'sentinel/core.py'
      - 'sentinel/preprocess.py'
      - 'entrypoint.py'
      - 'evals/fixtures/**'
      - '.github/workflows/eval.yml'

permissions:
  contents: read

jobs:
  eval:
    name: Deterministic eval
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]" || pip install -e .
      - run: pip install pyyaml

      - name: Run sentinel eval (deterministic scorer)
        # Explicit fork guard. GitHub already withholds secrets from
        # fork-triggered pull_request workflows; this `if:` makes the
        # restriction visible at the step level and avoids an empty-key
        # failure on a fork PR.
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python entrypoint.py eval run
